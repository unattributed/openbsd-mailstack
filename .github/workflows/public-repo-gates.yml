name: public repo gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  repo-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ksh

      - name: Run repo-only validation gates
        run: |
          ksh ./scripts/verify/run-repo-ci-gates.ksh
