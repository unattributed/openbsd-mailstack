name: Operator validation report
description: Record a public-only validation pass, lab test, or deployment result.
title: "validation: "
labels:
  - validation
body:
  - type: dropdown
    id: validation_type
    attributes:
      label: Validation type
      options:
        - public repo readiness check
        - QEMU lab validation
        - install and phase sequence
        - monitoring site validation
        - backup and restore drill
        - maintenance or regression run
        - network and exposure validation
        - other
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Tested commit
      placeholder: e.g. 6614d43
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Test environment
      description: Describe host OS, QEMU lab, or other safe environment details.
    validations:
      required: true
  - type: textarea
    id: executed
    attributes:
      label: Commands or workflow executed
      render: shell
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result summary
      description: State whether the run passed, failed, or partially passed.
    validations:
      required: true
  - type: textarea
    id: followup
    attributes:
      label: Follow-up items
      description: List any bugs, docs gaps, or caveats found during validation.
