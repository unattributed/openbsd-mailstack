name: Documentation gap
description: Report missing, stale, contradictory, or unclear project documentation.
title: "docs: "
labels:
  - documentation
body:
  - type: dropdown
    id: section
    attributes:
      label: Documentation area
      options:
        - README
        - docs index
        - install guide
        - phase documentation
        - operations guide
        - configuration examples
        - contributing or security docs
        - other
    validations:
      required: true
  - type: input
    id: path
    attributes:
      label: File or path
      placeholder: e.g. docs/install/09-install-order-and-phase-sequence.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is missing or incorrect
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Recommended correction
      description: Include the exact missing step, clarified wording, or navigation change if you know it.
