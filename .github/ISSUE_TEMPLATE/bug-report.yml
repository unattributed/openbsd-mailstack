name: Bug report
description: Report a reproducible problem in documentation, scripts, templates, or generated outputs.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail for another operator to reproduce the issue safely.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - documentation
        - install path
        - phase apply or verify script
        - service template
        - generated output
        - monitoring or operations
        - backup or disaster recovery
        - network or exposure control
        - security hardening or secrets
        - other
    validations:
      required: true
  - type: input
    id: repo_commit
    attributes:
      label: Repository commit
      description: Commit hash where you saw the issue.
      placeholder: e.g. 6614d43
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Concisely describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact commands, file paths, or actions that reproduce the issue.
      placeholder: |
        1. cd /home/foo/Workspace/openbsd-mailstack
        2. ksh ./scripts/verify/verify-public-repo-readiness.ksh
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched for existing issues first.
          required: true
        - label: I removed secrets, private keys, tokens, and sensitive host data from the report.
          required: true
