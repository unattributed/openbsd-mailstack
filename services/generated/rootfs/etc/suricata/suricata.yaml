%YAML 1.1
---
vars:
  address-groups:
    HOME_NET: "[127.0.0.0/8,10.44.0.0/24,192.168.1.0/24]"
    EXTERNAL_NET: "!$HOME_NET"

default-rule-path: /var/lib/suricata/rules
default-log-dir: /var/log/suricata

stats:
  enabled: yes
  interval: 8

outputs:
  - fast:
      enabled: yes
      filename: fast.log
      append: yes
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      community-id: true
      types:
        - alert:
            tagged-packets: yes
        - anomaly:
            enabled: yes
        - http:
            extended: yes
        - dns: {}
        - tls:
            extended: yes
            custom: [subject, issuer, serial, sni, version, not_before, not_after, ja3, ja3s]
        - drop:
            alerts: yes
            flows: all
            verdict: yes
        - smtp: {}
        - ssh: {}
        - flow: {}
        - stats:
            totals: yes
            threads: no
            deltas: no

logging:
  default-log-level: notice
  outputs:
    - file:
        enabled: yes
        level: info
        filename: suricata.log

pcap:
  - interface: em0
    checksum-checks: auto
    bpf-filter: "host 192.0.2.10"

rule-files:
  - suricata.rules
  - local.rules

threshold-file: /etc/suricata/threshold.config
