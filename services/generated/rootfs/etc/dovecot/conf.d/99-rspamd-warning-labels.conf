# Run a global sieve-before policy during LMTP delivery so repo-managed Rspamd
# warning labels can route suspicious mail into Junk before clients sync it.
protocol lmtp {
  mail_plugins = $mail_plugins sieve
}

plugin {
  sieve_before = /etc/dovecot/sieve-before
}

namespace inbox {
  mailbox Junk {
    auto = subscribe
  }
}
