-r -- # Main HTTPS vhost for mail.example.com
-r -- # nginx chroot: /var/www
-r -- #
-r -- # Exposed URLs:
-r -- # - https://mail.example.com/postfixadmin/
-r -- # - https://mail.example.com/ (Roundcube webmail)
-r -- # - https://mail.example.com/sogo (SOGo groupware)
-r -- # - https://mail.example.com/pf/ (pfstat for pf, suricata, and spamd)
-r -- # - https://mail.example.com/dr/ (obsd1-dr portal)
-r -- 
-r -- 
-r -- server {
-r --     listen 127.0.0.1:443 ssl;
-r --     listen 10.44.0.1:443 ssl;
-r --     http2 on;
-r -- 
-r --     server_name mail.example.com 10.44.0.1 127.0.0.1;
-r -- 
-r --     # Default root for this vhost (inside chroot /var/www)
-r --     # /htdocs is /var/www/htdocs on the real filesystem
-r --     root /htdocs;
-r --     index index.php index.html;
-r -- 
-r --     # Serve outbound-brand assets such as BIMI SVGs or mark certificates from
-r --     # a stable HTTPS path on the same host that publishes outbound mail auth.
-r --     location ^~ /.well-known/bimi/ {
-r --         try_files $uri =404;
-r --         add_header Cache-Control "public, max-age=300";
-r --     }
-r -- 
-r --     # TLS, misc hardening, and application templates
-r --     include /etc/nginx/templates/ssl.tmpl;
-r --     include /etc/nginx/templates/misc.tmpl;
-r --     include /etc/nginx/templates/roundcube.tmpl;
-r -- -r --     include /etc/nginx/templates/postfixadmin.tmpl;
-r --     include /etc/nginx/templates/php-catchall.tmpl;
-r --     include /etc/nginx/templates/stub_status.tmpl;
-r -- -r -- -r -- -r --     include /etc/nginx/templates/rspamd.tmpl;
-r -- -r -- 
-r --     # General logs for this vhost
-r --     access_log /var/log/nginx/mail.access.log;
-r --     error_log  /var/log/nginx/mail.error.log;
-r -- }
