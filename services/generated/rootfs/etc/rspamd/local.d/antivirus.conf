-r -- # PHASE-06C: Rspamd antivirus integration using ClamAV
-r -- # local.d/antivirus.conf contains scanner blocks only,
-r -- # the outer `antivirus {}` is defined in modules.d/antivirus.conf.
-r -- 
-r -- clamav {
-r --   action = "reject";         # hard reject infected mail
-r --   log_clean = true;
-r --   symbol = "CLAM_VIRUS";
-r --   type = "clamav";
-r -- 
-r --   # Socket path taken from /etc/clamd.conf:
-r --   #   LocalSocket /var/run/clamav/clamd.sock
-r --   # Antivirus module expects `servers`, which may be a Unix socket path.
-r --   servers = "/var/run/clamav/clamd.sock";
-r -- 
-r --   # Let ClamAV scan MIME parts, this is the recommended modern setting
-r --   scan_mime_parts = true;
-r -- 
-r --   # Retry transient local-socket failures before yielding CLAM_VIRUS_FAIL.
-r --   retransmits = 4;
-r --   timeout = 20s;
-r -- }
