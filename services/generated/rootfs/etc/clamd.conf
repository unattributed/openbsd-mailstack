DatabaseDirectory /var/db/clamav
LocalSocket /var/run/clamav/clamd.sock
LocalSocketMode 660
LocalSocketGroup _vscan
User _clamav
# Prevent resource exhaustion
MaxFileSize 100M
MaxScanSize 200M
MaxRecursion 16
MaxDirectoryRecursion 20

# Performance and safety
ReadTimeout 300
MaxThreads 12
StreamMaxLength 25M

# Logging
LogFile /var/log/clamav/clamd.log
LogTime yes